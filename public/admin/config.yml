backend:
  name: git-gateway
  branch: main

local_backend: true

media_folder: "public/uploads"
public_folder: "/uploads"

site_url: "https://ericavilarpsi.com.br"
display_url: "https://ericavilarpsi.com.br"
logo_url: "/favicon-32x32.png"

collections:
  - name: "posts"
    label: "Blog"
    label_singular: "Artigo"
    folder: "content/posts"
    create: true
    slug: "{{slug}}"
    extension: "md"
    format: "frontmatter"
    summary: "{{title}} — {{date}}"
    preview_path: "blog/{{slug}}"

    fields:
      - label: "Título do artigo"
        name: "title"
        widget: "string"
        required: true
        hint: "Título principal que aparecerá no topo do artigo."

      - label: "Endereço do artigo"
        name: "slug"
        widget: "string"
        required: true
        hint: "Use letras minúsculas, sem acentos e com hífens. Ex: imagem-pessoal-e-autoestima"

      - label: "Data de publicação"
        name: "date"
        widget: "datetime"
        required: true
        date_format: "DD/MM/YYYY"
        time_format: false
        format: "YYYY-MM-DD"

      - label: "Imagem de capa"
        name: "thumbnail"
        widget: "image"
        required: false
        hint: "Imagem horizontal que aparecerá no card e no topo do artigo. Recomendado: 1600x900px."

      - label: "Resumo do artigo"
        name: "excerpt"
        widget: "text"
        required: false
        hint: "Resumo curto para aparecer na página do blog e nas descrições."

      - label: "Conteúdo"
        name: "body"
        widget: "markdown"
        required: true
        hint: "Escreva aqui o conteúdo completo do artigo."